name: Alias career-ops-dave.vercel.app

on:
  push:
    branches: [career-ops-dave]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment and re-alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
          PROJECT_ID: prj_FBWjxwWcnrzreWH6nSNPdgXW9OMD
          TEAM_ID: team_dLLt0jq005uxnowo8Jk9Nm3F
        run: |
          echo "Waiting for Vercel deployment of $COMMIT_SHA..."
          for i in $(seq 1 36); do
            RESPONSE=$(curl -s \
              "https://api.vercel.com/v6/deployments?projectId=$PROJECT_ID&teamId=$TEAM_ID&meta-githubCommitSha=$COMMIT_SHA" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            DEPLOYMENT_URL=$(echo "$RESPONSE" | jq -r '.deployments[] | select(.state == "READY") | .url' | head -1)
            if [ -n "$DEPLOYMENT_URL" ] && [ "$DEPLOYMENT_URL" != "null" ]; then
              echo "Deployment ready: $DEPLOYMENT_URL"
              curl -s -X POST \
                "https://api.vercel.com/v2/deployments/https%3A%2F%2F${DEPLOYMENT_URL}/aliases?teamId=$TEAM_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"alias":"career-ops-dave.vercel.app"}'
              echo "✅ career-ops-dave.vercel.app now points to $DEPLOYMENT_URL"
              exit 0
            fi
            echo "Attempt $i/36: not ready yet, waiting 10s..."
            sleep 10
          done
          echo "❌ Timed out after 6 minutes waiting for deployment"
          exit 1
