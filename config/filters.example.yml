# Job Pipeline — Filters & Portals
# Copy this to filters.yml and customize.

portals:
  # Greenhouse API (free, no auth needed)
  - name: Anthropic
    type: greenhouse
    company_id: anthropic
    enabled: true
  - name: OpenAI
    type: greenhouse
    company_id: openai
    enabled: true
  - name: Retool
    type: greenhouse
    company_id: retool
    enabled: true
  - name: Vercel
    type: greenhouse
    company_id: vercel
    enabled: true

  # Ashby API
  - name: ElevenLabs
    type: ashby
    company_id: elevenlabs
    enabled: true
  - name: Langfuse
    type: ashby
    company_id: langfuse
    enabled: true

  # Lever API
  - name: n8n
    type: lever
    company_id: n8n-io
    enabled: true

job_boards:
  - type: indeed_rss
    queries:
      - "senior AI engineer remote"
      - "staff machine learning engineer remote"
    enabled: true

required_keywords: []
