<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} - Cover Letter</title>
<style>
  /* Static font instances. Variable fonts (weight ranges, opsz axis on DM Sans)
     mishandle text positioning in Chromium's PDF backend. Static instances at
     the actually-used weights bypass axis interpolation. Same as resume.html. */
  @font-face { font-family: 'Space Grotesk'; src: url('./fonts/space-grotesk-latin-400.woff2') format('woff2'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'Space Grotesk'; src: url('./fonts/space-grotesk-latin-700.woff2') format('woff2'); font-weight: 700; font-style: normal; }
  @font-face { font-family: 'DM Sans'; src: url('./fonts/dm-sans-latin-400.woff2') format('woff2'); font-weight: 400; font-style: normal; }
  @font-face { font-family: 'DM Sans'; src: url('./fonts/dm-sans-latin-500.woff2') format('woff2'); font-weight: 500; font-style: normal; }
  @font-face { font-family: 'DM Sans'; src: url('./fonts/dm-sans-latin-600.woff2') format('woff2'); font-weight: 600; font-style: normal; }
  @font-face { font-family: 'DM Sans'; src: url('./fonts/dm-sans-latin-700.woff2') format('woff2'); font-weight: 700; font-style: normal; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Cover letter scale is more generous than resume (10px body, 1.6 line-height,
     wider page padding) because cover letters are prose-driven and need
     readability over density. Matches the same color palette and font system as
     resume.html so both PDFs feel like the same candidate. */
  html, body {
    width: 8.5in;
    background: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    line-height: 1.6;
    color: #2f2f2f;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page { width: 8.5in; padding: 0.45in 0.6in; background: #fff; }

  /* Links never break across lines */
  a { white-space: nowrap; color: inherit; text-decoration: none; }

  /* === HEADER === */
  .header { margin-bottom: 8px; }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
    line-height: 1.1;
  }
  .header-gradient { height: 1.5px; background: hsl(187, 74%, 32%); margin-bottom: 5px; }
  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    font-size: 9.5px;
    color: #555;
  }
  .contact-row .separator { color: #ccc; }

  /* === DATE + ADDRESSEE === */
  .meta-block { margin-top: 28px; margin-bottom: 24px; }
  .date-line { font-size: 10px; color: #2f2f2f; margin-bottom: 16px; }
  .addressee { font-size: 10px; color: #2f2f2f; line-height: 1.5; }
  .addressee .company-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    color: #1a1a2e;
  }

  /* === SALUTATION + BODY === */
  .salutation { font-size: 10px; color: #2f2f2f; margin-bottom: 12px; }
  .paragraph {
    font-size: 10px;
    line-height: 1.65;
    color: #2f2f2f;
    margin-bottom: 16px;
  }
  .paragraph strong {
    font-weight: 600;
    color: #1a1a2e;
  }

  /* === CLOSING === */
  .closing-block { margin-top: 24px; }
  .closing-line { font-size: 10px; color: #2f2f2f; margin-bottom: 12px; }
  .signature-img {
    display: block;
    height: 42px;
    opacity: 0.9;
    margin-bottom: 4px;
  }
  .typed-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #1a1a2e;
  }
  .typed-title {
    font-size: 9.5px;
    color: #555;
    margin-top: 2px;
  }

  /* === OPTIONAL APPLIED AI PROJECTS LIST ===
     Sits between body paragraphs and the closing paragraph when the JD warrants
     a project mention. The {{LIST_INTRO}} token is a transition <div class="paragraph">
     that bridges the body to the bullet list; {{PROJECTS_LIST}} is the <ul>. The
     skill emits empty strings for both when no projects section is needed. */
  .cover-letter-projects-list {
    list-style: disc;
    padding-left: 16px;
    margin: 0 0 16px 0;
    font-size: 9.5px;
    line-height: 1.5;
    color: #2f2f2f;
  }
  .cover-letter-projects-list li { margin-bottom: 3px; }
  .cover-letter-projects-list li:last-child { margin-bottom: 0; }
  .cover-letter-projects-list li strong { color: #1a1a2e; font-weight: 600; }

  /* === PRINT === */
  @page { size: letter; margin: 0; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0.45in 0.6in; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- DATE + ADDRESSEE -->
  <div class="meta-block">
    <div class="date-line">{{DATE}}</div>
    <div class="addressee">
      {{ADDRESSEE_LINE1}}<br>
      <span class="company-name">{{COMPANY_NAME}}</span><br>
      {{ROLE_TITLE}}
    </div>
  </div>

  <!-- SALUTATION -->
  <div class="salutation">{{SALUTATION}}</div>

  <!-- BODY PARAGRAPHS -->
  {{BODY_PARAGRAPHS}}

  <!-- OPTIONAL APPLIED AI PROJECTS LIST (skill emits empty strings to skip) -->
  {{LIST_INTRO}}
  {{PROJECTS_LIST}}

  <!-- CLOSING -->
  <div class="closing-block">
    <div class="closing-line">{{CLOSING_LINE}}</div>
    {{SIGNATURE_BLOCK}}
    <div class="typed-name">{{NAME}}</div>
    <div class="typed-title">{{TYPED_TITLE}}</div>
  </div>

</div>
</body>
</html>
